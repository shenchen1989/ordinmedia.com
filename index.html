                        role: '执行艺术总监 & 首席男高音', roleEn: 'Executive Artistic Director & Principal Tenor', roleDa: 'Administrerende kunstnerisk leder & Ledende tenor',
                        taglineZh: '美声歌唱家 • 艺术总监', taglineEn: 'Bel Canto Specialist • Artistic Director', taglineDa: 'Bel Canto Specialist • Kunstnerisk leder',
                        bioZh: '徐晨，活跃于国际舞台的中国青年男高音歌唱家，奧丁傳媒执行艺术总监。他以其卓越的声音控制力、极具感染力的舞台表现力以及对意大利贝尔坎托（Bel Canto）传统的深刻理解而著称。\n\n徐晨拥有上海音乐学院硕士学位，并于丹麦皇家音乐学院获得声乐最高文凭（独唱家学位）。他曾师从多位世界级歌唱家，包括传奇男高音 Salvatore Fisichella 和 Francisco Araiza。他在欧洲多个重要剧院与音乐厅留下了演唱足迹，尤其在拉脱维亚 Operetes teātris 的表现受到了当地媒体的广泛关注与高度评价，被誉为“金嗓子”。\n\n他的职业生涯足迹遍布全球重要舞台。2016年，他在上海东方艺术中心《费加罗的婚礼》中饰演 Basilio 开启首秀；2017年，他在北京国家大剧院《玫瑰骑士》中饰演意大利歌手；2019年，他分别在柏林德尔菲剧院《魔笛》饰演 Tamino，以及在意大利波尔扎诺市立剧院《弄臣》中饰演公爵；2022年，他在阿尔巴尼亚国家歌剧院《罗密欧与朱丽叶》中担纲主角罗密欧。此外，他还多次作为独唱家参演《威尔第安魂曲》、《韩德尔弥赛亚》及《贝多芬第九交响曲》。\n\n在声乐比赛中，他先后荣获第十届中国音乐金钟奖分赛区金奖、第五十一届图卢兹国际声乐比赛决赛奖、2017年维也纳国际音乐比赛一等奖、2018年维也纳新年音乐会比赛一等奖、2021年罗马“Grand Prize Virtuoso”国际音乐比赛一等奖，以及2025年 Marina Zirdziņa 国际声乐比赛一等奖。\n\n徐晨曾与马耳他爱乐乐团、柏林城市交响乐团、维也纳青年交响乐团、上海爱乐乐团、匈牙利国家交响乐团、阿尔巴尼亚国家交响乐团及拉脱维亚国家交响乐团等世界顶尖乐团合作演出。除了活跃在演出舞台，徐晨还致力于声乐教育与文化交流。他多次举办国际大师班，旨在将欧洲正统的美声唱法引入中国，并为中欧音乐人才搭建交流的桥梁。',
                        bioEn: 'Xu Chen is a young Chinese tenor active on international stages and the Executive Artistic Director of Ordin Media. He is known for his exceptional vocal control, charismatic stage presence, and profound understanding of the Italian Bel Canto tradition. \n\nHe holds a master\'s degree from the Shanghai Conservatory of Music and a soloist degree (top degree) from the Royal Danish Academy of Music. He studied under world-renowned singers, including legendary tenors Salvatore Fisichella and Francisco Araiza. He has performed in major European theaters and concert halls, particularly in Latvia\'s Operetes teātris, where his performance was highly praised and he was dubbed the "Golden Voice". \n\nHis operatic journey includes notable debuts at major venues: Basilio in "Le Nozze di Figaro" (Shanghai Oriental Art Center, 2016), the Italian singer in "Der Rosenkavalier" (National Centre for the Performing Arts, Beijing, 2017), Tamino in "Die Zauberflöte" (Delphi Theatre, Berlin, 2019), Duca in "Rigoletto" (Teatro Comunale di Bolzano, 2019), and Romeo in "Roméo et Juliette" (Albanian National Opera House, 2022). He has also performed as a soloist in masterpieces such as Verdi\'s "Requiem", Handel\'s "Messiah", and Beethoven\'s "Symphony No. 9". \n\nXu Chen has received numerous prestigious awards, including the Gold Award at the 10th China Golden Bell Award (regional), Finalist Award at the 51st Toulouse International Vocal Competition, First Prize at the 2017 Vienna International Music Competition, First Prize at the 2018 Vienna New Year Concert Competition, First Prize at the 2021 Rome "Grand Prize Virtuoso", and First Prize at the 2025 Marina Zirdziņa International Vocal Competition.\n\nHe has collaborated with world-class orchestras such as the Malta Philharmonic, Berlin City Symphony, Vienna Youth Symphony, Shanghai Philharmonic, Hungarian National Symphony, and Latvian National Symphony. Beyond performing, he is committed to vocal education and cultural exchange, hosting international masterclasses to bridge musical talents between China and Europe.',
                        bioDa: 'Xu Chen er en ung kinesisk tenor aktiv på internationale scener og administrerende kunstnerisk leder af Ordin Media. Han er kendt for sin enestående stemmekontrol, karismatiske scenetilstedeværelse og dybe forståelse af den italienske Bel Canto-tradition. \n\nHan er uddannet med en kandidatgrad fra Shanghai Musikkonservatorium og har modtaget solistklassen (højeste grad) fra Det Kongelige Danske Musikkonservatorium. Han har studeret under verdenskendte sangere, herunder de legendariske tenorer Salvatore Fisichella og Francisco Araiza. Han har optrådt i store europæiske teatre og koncertsale, især i Letlands Operetes teātris, hvor hans optræden blev rost meget, og han blev døbt "Golden Voice". \n\nHans operatiske rejse inkluderer bemærkelsesværdige debuter: Basilio i "Le Nozze di Figaro" (Shanghai Oriental Art Center, 2016), den italienske sanger i "Der Rosenkavalier" (Beijings Nationalteater, 2017), Tamino i "Tryllefløjten" (Delphi Theatre, Berlin, 2019), Duca i "Rigoletto" (Teatro Comunale di Bolzano, 2019) og Romeo i "Roméo et Juliette" (Albaniens Nationalopera, 2022). Han har også optrådt som solist i værker som Verdis "Requiem", Händels "Messias" og Beethovens "9. Symfoni". \n\nXu Chen har modtaget adskillige priser, herunder guld ved den 10. China Golden Bell Award (regionalt), finalist ved den 51. Toulouse International Vocal Competition, førstepræmie ved 2017 Vienna International Music Competition, førstepræmie ved 2018 Vienna New Year Concert Competition, førstepræmie ved 2021 Rome "Grand Prize Virtuoso" og førstepræmie ved 2025 Marina Zirdziņa International Vocal Competition. \n\nHan har samarbejdet med orkestre som Malta Philharmonic, Berlin City Symphony, Vienna Youth Symphony, Shanghai Philharmonic, Hungarian National Symphony og Latvian National Symphony. Han er også dedikeret til sangundervisning og til at bygge broer mellem Kina og Europa.',

                    'salvatore-fisichella': {
                        name: 'Salvatore Fisichella', nameEn: 'Salvatore Fisichella', nameDa: 'Salvatore Fisichella',
                        role: '传奇男高音 & 国际艺术家顾问', roleEn: 'Legendary Tenor & International Artistic Advisor', roleDa: 'Legendarisk tenor og international kunstnerisk rådgiver',
                        taglineZh: '当代贝里尼歌唱作品的最佳诠释者', taglineEn: 'The Ultimate Interpreter of Bellini\'s Repertoire', taglineDa: 'Den ultimative fortolker af Bellinis repertoire',
                        bioZh: '萨尔瓦托雷·菲西凯拉（Salvatore Fisichella）是当代最具代表性的意大利美声男高音之一。他以极其明亮且极具穿透力的嗓音著称，被广泛认为是演绎贝里尼（Bellini）歌剧作品的最佳男高音。\n\n在数十年的艺术生涯中，他与卡拉扬、穆蒂等指挥大师合作，活跃于斯卡拉歌剧院、大都会歌剧院等世界顶尖舞台。他的演唱风格继承了正统的意大利美声传统，不仅在技巧上达到了顶峰，在情感的细腻表达上也为后辈树立了标杆。',
                        bioEn: 'Salvatore Fisichella is one of the most representative Italian Bel Canto tenors of our time. Renowned for his exceptionally bright and penetrating voice, he is widely considered the ultimate interpreter of Bellini\'s operatic works.\n\nThroughout his decades-long career, he collaborated with legendary conductors like Karajan and Muti, performing at the world\'s most prestigious venues, including La Scala and the Metropolitan Opera. His singing style inherits the authentic Italian Bel Canto tradition, reaching technological peaks while setting benchmarks for emotional expression.',
                        bioDa: 'Salvatore Fisichella er en af de mest repræsentative italienske Bel Canto-tenorer i vor tid. Han er kendt for sin usædvanligt lyse og gennemtrængende stemme og betragtes af mange som den ultimative fortolker af Bellinis operaværker.\n\nGennem sin årtier lange karriere har han samarbejdet med legendariske dirigenter som Karajan og Muti og optrådt på verdens mest prestigefyldte scener, herunder La Scala og Metropolitan Opera. Hans sangstil er en arv fra den autentiske italienske Bel Canto-tradition, hvor han når tekniske højder og sætter standarder for emotionelt udtryk.',
                        img: 'https://i.postimg.cc/26mV79L6/Salvatore-Fisichella-close-up.jpg',
                        link: 'https://en.wikipedia.org/wiki/Salvatore_Fisichella'
                    },
                    'francisco-araiza': {
                        name: 'Francisco Araiza', nameEn: 'Francisco Araiza', nameDa: 'Francisco Araiza',
                        role: '世界著名男高音 & 国际艺术家顾问', roleEn: 'World-Renowned Tenor & International Artistic Advisor', roleDa: 'Verdensberømt tenor og international kunstnerisk rådgiver',
                        taglineZh: '莫扎特与罗西尼作品的最佳诠释者', taglineEn: 'Master of Mozart and Rossini Repertoire', taglineDa: 'Mester i Mozart og Rossini repertoire',
                        bioZh: '弗朗西斯科·阿莱扎（Francisco Araiza）是享誉世界的抒情男高音。他在莫扎特和罗西尼作品领域的造诣极深，被认为是当代最具影响力的歌唱家之一。\n\n他的嗓音兼具力量与灵活性，不仅在古典剧目中表现出色，并在德语艺术歌曲、法国以及后期浪漫主义剧目中也留下了经典的演绎。他曾长期担任苏黎世歌剧院等顶尖剧院的首席男高音，并多次在格莱美等国际奖项中获得认可。',
                        bioEn: 'Francisco Araiza is a world-renowned lyric tenor. With profound expertise in the works of Mozart and Rossini, he is considered one of the most influential singers of the contemporary era.\n\nHis voice combines power with agility, excelling not only in classical repertoire but also producing definitive interpretations of German Lieder, French, and late Romantic works. He served for many years as the leading tenor at top houses like the Zurich Opera House and has been recognized with numerous international awards, including Grammys.',
                        bioDa: 'Francisco Araiza er en verdenskendt lyrisk tenor. Med sin dybe ekspertise i værker af Mozart og Rossini betragtes han som en af de mest indflydelsesrige sangere i den moderne æra.\n\nHans stemme kombinerer kraft med smidighed og udmærker sig ikke kun i det klassiske repertoire, men leverer også definerende fortolkninger af tyske Lieder, franske og senromantiske værker. Han fungerede i mange år som den ledende tenor på topteatre som Zürich Operahus og er blevet anerkendt med adskillige internationale priser, herunder Grammyer.',
                        img: 'https://i.postimg.cc/rpWK22LV/1900x1900-000000-80-0-0.jpg',

                        name: 'Eva Hess Thaysen', nameEn: 'Eva Hess Thaysen', nameDa: 'Eva Hess Thaysen',
                        role: '丹麦皇家音乐学院教授 & 国际艺术家顾问', roleEn: 'Professor at RDAM & International Artistic Advisor', roleDa: 'Professor ved DKDM og international kunstnerisk rådgiver',
                        taglineZh: '声乐教学法专家', taglineEn: 'Expert in Vocal Pedagogy', taglineDa: 'Ekspert i vokalkpædagogik',
                        bioZh: '伊娃·赫斯·泰森（Eva Hess Thaysen）是著名的丹麦女高音歌唱家，现任丹麦皇家音乐学院（RDAM）声乐系教授。\n\n她在声乐教学法领域拥有极高的学术造诣，多年来致力于培养新一代国际声乐人才。她的演出足迹遍布欧洲，尤其在德语艺术歌曲和当代作品的诠释上享有盛誉。作为教育家，她擅长挖掘学生的潜力，帮助他们在那充满挑战的国际艺术舞台上找到个人特色。',
                        bioEn: 'Eva Hess Thaysen is a renowned Danish soprano and Professor at the Royal Danish Academy of Music (RDAM).\n\nShe possesses supreme academic expertise in vocal pedagogy and has dedicated years to training the next generation of international vocal talent. Her performances span Europe, where she is particularly celebrated for her interpretations of German Lieder and contemporary works. As an educator, she excels at unlocking student potential, helping them find their unique identity in the challenging international arts landscape.',
                        bioDa: 'Eva Hess Thaysen er en anerkendt dansk sopran og professor ved Det Kongelige Danske Musikkonservatorium (DKDM).\n\nHun besidder enestående akademisk ekspertise inden for sangpædagogik og har dedikeret mange år til at uddanne den næste generation af internationale sangtalenter. Hendes optrædener spænder over hele Europa, hvor hun er særligt kendt for sine fortolkninger af tyske Lieder og moderne værker. Som underviser er hun fremragende til at forløse elevernes potentiale og hjælpe dem med at finde deres unikke identitet i det udfordrende internationale kunstlandskab.',
                        img: 'https://i.postimg.cc/5t6vTRsF/wei-xin-tu-pian-20260516230128.png',
                        link: 'https://www.dkdm.dk/en/employee/eva-hess-thaysen'
                    },

                        role: '丹麦皇家音乐学院教授 & 国际艺术家顾问', roleEn: 'Professor at RDAM & International Artistic Advisor', roleDa: 'Professor ved DKDM og international kunstnerisk rådgiver',
                        taglineZh: '资深歌唱家与音乐教育家', taglineEn: 'Veteran Singer & Music Educator', taglineDa: 'Erfaren sanger og musikpædagog',
                        bioZh: '安妮·玛格丽特·达尔（Anne Margrethe Dahl）是丹麦顶尖的女高音歌唱家及艺术教育家。\n\n她曾长期担任丹麦皇家歌剧学院院长，在艺术管理与人才选拔方面经验丰厚。她的舞台经验极其丰富，曾在哥本哈根、柏林、斯德哥尔摩等地的歌剧院担任主角。目前她担任多所音乐学院的客座教授，并作为评委活跃于各大国际声乐比赛。',
                        bioEn: 'Anne Margrethe Dahl is a leading Danish soprano and arts educator. \n\nShe served for many years as the Head of the Royal Danish Opera Academy, gaining extensive experience in artistic management and talent selection. Her stage experience is exceptionally rich, having performed lead roles at opera houses in Copenhagen, Berlin, and Stockholm. She is currently a visiting professor at multiple conservatories and remains active as a judge for major international vocal competitions.',
                        bioDa: 'Anne Margrethe Dahl er en førende dansk sopran og kunstunderviser. \n\nHun fungerede i mange år som forstander for Det Kongelige Danske Operaakademi og har opnået omfattende erfaring inden for kunstnerisk ledelse og talentudvælgelse. Hendes sceneerfaring er usædvanligt rig, og hun har optrådt i hovedroller på operahuse i København, Berlin og Stockholm. Hun er i øjeblikket gæsteprofessor ved flere konservatorier og er fortsat aktiv som dommer ved store internationale sangkonkurrencer.',
                        img: 'https://i.postimg.cc/5tP0dBPH/anne-margrethe-dahl-26-1.jpg',

                <p class="text-prestige-ink/70 text-lg md:text-xl font-light leading-relaxed serif-italic" 
                   x-text="t('在这个加速重构的世界里，技术在连接万物，而艺术在唤醒人心。我们深知，音乐从来不只是音符的排列，它是人类共通的语言，是跨越文化、时空与阶层的最强共鸣。奥丁传媒诞生于对时代的敏锐洞察与对艺术的极致敬畏。我们不仅是一家音乐艺术公司，更是希望成为欧洲与中国的文化纽带，推动优秀的传统古典音乐在中欧之间传播与发展，无论是通过高水准的艺术现场、深度的音乐制作，优质的游学活动，还是启发性的艺术教育，我们致力于在浮躁的时代中，为个体提供精神的栖息地，用声音重构人与人之间的深度连接。我们坚信艺术具备赋能未来的力量。我们不仅发掘和助力新一代艺术家的成长，更致力于将艺术思维注入社会创新，让音乐成为推动社会向美、向善的力量。', 'In this world of accelerated reconstruction, technology is connecting everything, while art is awakening the human heart. We know that music is never just an arrangement of notes; it is a universal language of humanity, the strongest resonance across cultures, time, space, and class. Ordin Media was born from a keen insight into our times and an ultimate reverence for art. We are not just a music and arts company; we aspire to be the cultural link between Europe and China, promoting the dissemination and development of excellent traditional classical music between the two regions. Whether through high-level artistic performances, deep music production, quality study tours, or inspiring art education, we are committed to providing a spiritual sanctuary for individuals and reconstructing deep connections between people through sound in this restless age. We firmly believe that art possesses the power to empower the future. We not only discover and support the growth of a new generation of artists but also strive to inject artistic thinking into social innovation, making music a force for beauty and goodness in society.', 'I denne verden af accelereret rekonstruktion forbinder teknologien alt, mens kunsten vækker det menneskelige hjerte. Vi ved, at musik aldrig bare er en rækkefølge af noter; det er menneskehedens universelle sprog, den stærkeste resonans på tværs af kulturer, tid, rum og klasse. Ordin Media blev født ud fra en skarp indsigt i vores tid og en ultimativ ærefrygt for kunst. Vi er ikke kun et musik- og kunst firma; vi stræber efter at være det kulturelle bindeled mellem Europa og Kina og fremme formidlingen og udviklingen af fremragende traditionel klassisk musik mellem de to regioner. Uanset om det er gennem kunstneriske optrædener på højt niveau, dyb musikproduktion, kvalitetsstudieture eller inspirerende kunstuddannelse, er vi forpligtet til at tilbyde et åndeligt fristed for enkeltpersoner og genopbygge dybe forbindelser mellem mennesker gennem lyd i denne urolige tid. Vi tror fuldt og fast på, at kunst besidder kraften til at styrke fremtiden. Vi opdager og støtter ikke kun væksten af en ny generation af kunstnere, men stræber også efter at injicere kunstnerisk tænkning i social innovation, så musikken bliver en kraft for skønhed og godhed i samfundet.')"></p>

                <div class="lg:col-span-3">
                    <h4 class="text-prestige-gold uppercase text-xs font-bold tracking-[0.2em] mb-8" x-text="t('导航', 'Navigation', 'Navigation')"></h4>
                    <ul class="space-y-4 text-white/60 font-light text-sm">
                        <li><a href="#home" class="hover:text-white transition-colors" x-text="t('首页', 'Home', 'Hjem')"></a></li>
                        <li><a href="#team" class="hover:text-white transition-colors" x-text="t('执行艺术总监 徐晨', 'Artistic Director Xu Chen', 'Kunstnerisk leder Xu Chen')"></a></li>
                        <li><a href="#services" class="hover:text-white transition-colors" x-text="t('业务', 'Services', 'Tjenester')"></a></li>
                        <li><a href="#events" class="hover:text-white transition-colors" x-text="t('活动', 'Events', 'Begivenheder')"></a></li>
                    </ul>
                </div>

                <div class="lg:col-span-4">
                    <h4 class="text-prestige-gold uppercase text-xs font-bold tracking-[0.2em] mb-8" x-text="t('联系方式', 'Get In Touch', 'Kontakt os')"></h4>
                    <div class="space-y-6">
                        <div class="flex items-start gap-4">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-prestige-gold mt-1"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                            <div>
                                <p class="text-xs uppercase font-bold opacity-40 mb-1" x-text="t('电子邮箱', 'Email', 'E-mail')"></p>
                                <p class="text-white/80">info@ordinmedia.com</p>
                            </div>
                        </div>
                        <div class="flex items-start gap-4">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-prestige-gold mt-1"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
                            <div>
                                <p class="text-xs uppercase font-bold opacity-40 mb-1" x-text="t('联系电话', 'Phone', 'Telefon')"></p>
                                <p class="text-white/80">+86 158 5189 9055</p>
                                <p class="text-white/80">+45 52 81 89 07</p>
                            </div>
                        </div>
                        <div class="flex items-start gap-4">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-prestige-gold mt-1"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                            <div>
                                <p class="text-xs uppercase font-bold opacity-40 mb-1" x-text="t('办公地点', 'Office', 'Kontor')"></p>
                                <p class="text-white/80">Etta Camerons vej. 13 st.th</p>
                                <p class="text-white/80">2450 Copenhagen, Denmark</p>
                                <p class="text-white/40 text-[10px] mt-2 font-bold tracking-widest uppercase">CVR: 46055152</p>
                            </div>
                        </div>
                    </div>

                    <div class="mt-12 pt-8 border-t border-white/5">
                        <p class="text-[9px] uppercase font-bold opacity-30 mb-6 text-white/50" x-text="t('支持支付方式', 'Supported Payments', 'Understøttede betalingsmetoder')"></p>
                        <div class="flex flex-wrap gap-2">
                            <template x-for="pay in [
                                { name: 'Airwallex', icon: 'https://raw.githubusercontent.com/2fasvg/2fasvg.github.io/master/assets/img/logo/airwallex.com/airwallex.com.svg' },
                                { name: 'Visa', slug: 'visa' },
                                { name: 'Mastercard', slug: 'mastercard' },
                                { name: 'PayPal', slug: 'paypal' },
                                { name: 'Alipay', slug: 'alipay' },
                                { name: 'WeChat Pay', slug: 'wechat' }
                            ]">
                                <div :title="pay.name" class="w-10 h-10 border border-white/10 flex items-center justify-center hover:bg-prestige-gold transition-all group/pay cursor-default">
                                    <img :src="pay.slug ? 'https://cdn.simpleicons.org/' + pay.slug + '/white' : pay.icon" 
                                         class="w-5 h-5 object-contain opacity-40 group-hover/pay:opacity-100 transition-all group-hover/pay:invert brightness-200"
                                         referrerpolicy="no-referrer">
                                </div>
                            </template>
                        </div>
                    </div>
                </div>
            </div>

            <div class="pt-12 border-t border-white/10 flex flex-col md:flex-row justify-between items-center gap-6 text-center md:text-left">
                <p class="text-[10px] uppercase tracking-widest text-white/30">
                    © 2025 <span x-text="t('奧丁傳媒', 'Ordin Media', 'Ordin Media')"></span>. All Rights Reserved.
                </p>
                <div class="flex gap-8 text-[10px] uppercase tracking-widest text-white/30">
                    <a href="#" class="hover:text-white transition-colors" x-text="t('隐私政策', 'Privacy Policy', 'Fortrolighedspolitik')"></a>
                    <a href="#" class="hover:text-white transition-colors" x-text="t('服务条款', 'Terms of Service', 'Servicevilkår')"></a>
                </div>
            </div>
        </div>
    </footer>
    </div>

    <!-- Generic Member Profile Page -->
    <div x-show="page === 'profile'" x-cloak class="min-h-screen bg-prestige-paper pt-20">
        <div class="fixed top-0 left-0 right-0 bg-prestige-paper/80 backdrop-blur-md z-50 border-b border-prestige-ink/5 px-6 py-4 flex justify-between items-center">
            <h2 class="font-serif text-2xl" x-text="t(selectedMember?.name + ' 个人简历', selectedMember?.nameEn + ' Profile', selectedMember?.nameDa + ' Profil')"></h2>
            <button @click="page = 'home'; selectedMember = null" class="p-2 hover:bg-prestige-ink/5 rounded-full transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" x2="6" y1="6" y2="18"/><line x1="6" x2="18" y1="6" y2="18"/></svg>
            </button>
        </div>

        <template x-if="selectedMember">
            <div class="max-w-5xl mx-auto px-6 py-16">
                <div class="grid grid-cols-1 md:grid-cols-12 gap-12 mb-24">
                    <div class="md:col-span-4">
                        <div class="aspect-[3/4] overflow-hidden rounded-sm border border-prestige-ink/5 shadow-xl">
                            <img :src="selectedMember.img" class="w-full h-full object-cover">
                        </div>
                        <div class="mt-8 space-y-4">
                            <div class="flex items-center gap-3 text-prestige-gold">
                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>
                                <span class="text-sm font-bold uppercase tracking-widest" x-text="t(selectedMember.role, selectedMember.roleEn, selectedMember.roleDa)"></span>
                            </div>
                        </div>
                    </div>
                    <div class="md:col-span-8">
                        <h1 class="text-5xl md:text-6xl font-serif mb-6" x-text="t(selectedMember.name, selectedMember.nameEn, selectedMember.nameDa)"></h1>
                        <p class="text-prestige-gold font-bold tracking-[0.2em] mb-8 uppercase" x-text="t(selectedMember.taglineZh, selectedMember.taglineEn, selectedMember.taglineDa)"></p>
                        <div class="prose prose-prestige max-w-none">
                            <p class="text-lg text-prestige-ink/80 leading-relaxed mb-8 whitespace-pre-wrap font-light" 
                               x-text="t(selectedMember.bioZh, selectedMember.bioEn, selectedMember.bioDa)"></p>
                        </div>
                        <template x-if="selectedMember.link">
                            <div class="flex gap-4 mt-12">
                                <a :href="selectedMember.link" target="_blank" class="flex items-center gap-2 text-xs font-bold uppercase tracking-widest border border-prestige-ink px-6 py-3 hover:bg-prestige-ink hover:text-white transition-all transform hover:-translate-y-1">
                                    <span x-text="selectedMember.nameEn === 'Xu Chen' ? t('访问官方网站', 'Official Website', 'Officiel hjemmeside') : t('参考资料', 'Reference', 'Reference')"></span>
                                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
                                </a>
                            </div>
                        </template>
                    </div>
                </div>

                <template x-if="selectedMember.extraImages">
                    <div class="border-t border-prestige-ink/10 pt-24">
                        <div class="flex items-center justify-between mb-12">
                            <h3 class="text-3xl font-serif" x-text="t('获奖及媒体报道', 'Awards & Media Coverage', 'Priser og mediedækning')"></h3>
                            <div class="w-24 h-[1px] bg-prestige-gold hidden md:block"></div>
                        </div>
                        
                        <div class="grid grid-cols-2 md:grid-cols-4 gap-6">
                            <template x-for="cert in selectedMember.extraImages">
                                <div class="aspect-[4/5] bg-white group cursor-zoom-in relative overflow-hidden border border-prestige-ink/5" @click="selectedImage = cert">
                                    <img :src="cert" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110">
                                    <div class="absolute inset-0 bg-prestige-ink/0 group-hover:bg-prestige-ink/20 transition-all flex items-center justify-center">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="opacity-0 group-hover:opacity-100 transition-opacity"><circle cx="12" cy="8" r="6"/><path d="M15.477 12.89 17 22l-5-3-5 3 1.523-9.11"/></svg>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </div>
                </template>
                
                <div class="mt-24 text-center">
                    <button @click="page = 'home'; selectedMember = null" class="text-xs font-bold uppercase tracking-widest border-b border-prestige-ink pb-1 hover:text-prestige-gold hover:border-prestige-gold transition-colors" x-text="t('返回首页', 'Back to Home', 'Tilbage til hjem')"></button>
                </div>
            </div>
        </template>
    </div>

    <!-- Lightbox (Global) -->
    <div x-show="selectedImage" 
         @keydown.window.escape="selectedImage = null" 
         class="fixed inset-0 z-[200] bg-black/95 flex items-center justify-center p-4 md:p-10 cursor-pointer" 
         @click="selectedImage = null" 
         x-cloak 
         x-transition:enter="transition ease-out duration-300"
         x-transition:enter-start="opacity-0"
         x-transition:enter-end="opacity-100"
         x-transition:leave="transition ease-in duration-200"
         x-transition:leave-start="opacity-100"
         x-transition:leave-end="opacity-0">
        <button class="absolute top-6 right-6 text-white/70 hover:text-white transition-colors z-[210] p-2 bg-white/10 rounded-full" @click="selectedImage = null">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" x2="6" y1="6" y2="18"/><line x1="6" x2="18" y1="6" y2="18"/></svg>
        </button>
        <img :src="selectedImage" 
             class="max-w-full max-h-[85vh] object-contain shadow-2xl cursor-default transition-transform duration-500" 
             @click.stop=""
             x-show="selectedImage"
             x-transition:enter="transition ease-out duration-500"
             x-transition:enter-start="scale-95 opacity-0"
             x-transition:enter-end="scale-100 opacity-100">
    </div>
